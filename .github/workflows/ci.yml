name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check out mock portal
        uses: actions/checkout@v4
        with:
          repository: bunizao/aplus-mock-portal
          path: aplus-mock-portal

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project and build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . build twine

      - name: Export mock portal root
        run: echo "APLUS_MOCK_PORTAL_ROOT=$GITHUB_WORKSPACE/aplus-mock-portal" >> "$GITHUB_ENV"

      - name: Run CLI smoke tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Build distribution artifacts
        run: python -m build

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Verify built wheel entrypoints
        run: |
          python -m venv .release-smoke
          .release-smoke/bin/pip install --upgrade pip
          .release-smoke/bin/pip install dist/*.whl
          .release-smoke/bin/attend --help
          .release-smoke/bin/python -m always_attend --version
